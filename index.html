<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela de Classificação</title>
<link rel="shortcut icon" href="logo.png" type="32x32">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    padding:20px;
    margin: 0%;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#0f172a;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

th{
    background:#1e293b;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.primeiro{
    background:#c8f7c5 !important;
    font-weight:bold;
}

.rebaixado{
    background:#ffd6d6 !important;
}

.botoes{
    text-align:center;
    margin-top:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.rodape{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:#334155;
}
.link{
    color: black;
    text-decoration: none;
    margin: 15px;
}
.link:hover{
    color: blue;
    text-decoration: underline;
}
div img{
    display: flex;
    justify-items: center;
    height: 150px;
}
div{
    margin: 20px;
}
.logo{
    display: flex;
    justify-content: center;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
    <img src="logo.png" alt="Logo">
</div>

<h1>Tabela de Classificação</h1>

<div class="botoes">
<button onclick="gerarPDF()">📄 Baixar PDF</button>
<a class="link" href="Regulamento.pdf">Regulamento</a>
<a class="link" href="">Campeões</a>
</div>

<table id="tabela">
<thead>
<tr>
<th>Posição</th>
<th>Nome</th>
<th>Pontos</th>
<th>Jogos</th>
<th>Vitórias</th>
<th>Empates</th>
<th>Derrotas</th>
<th>Data Nasc.</th>
<th>Idade</th>
</tr>
</thead>

<tbody id="corpoTabela"></tbody>

</table>

<div class="rodape">
Última atualização:
<span id="ultimaAtualizacao"></span>
</div>

</div>

<script>

// =========================================
// ADICIONE OS JOGADORES DIRETO NO CÓDIGO
// =========================================

const jogadores = [

{
nome:"Leonardo Bomfim",
vitorias:0,
empates:0,
derrotas:0,
nascimento:"25/02/1998"
},

{
nome:"Miguel da Silva",
vitorias:0,
empates:0,
derrotas:0,
nascimento:"18/03/2007"
},

];

// =========================================

function calcularIdade(dataBR){

const partes = dataBR.split("/");
const nascimento = new Date(
partes[2],
partes[1]-1,
partes[0]
);

const hoje = new Date();

let idade = hoje.getFullYear() - nascimento.getFullYear();

const mes = hoje.getMonth() - nascimento.getMonth();

if(
mes < 0 ||
(mes === 0 && hoje.getDate() < nascimento.getDate())
){
idade--;
}

return idade;
}

function carregarTabela(){

jogadores.forEach(j => {

j.pontos = (j.vitorias * 3) + j.empates;
j.jogos = j.vitorias + j.empates + j.derrotas;
j.idade = calcularIdade(j.nascimento);

});

jogadores.sort((a,b)=> b.pontos - a.pontos);

const tbody = document.getElementById("corpoTabela");
tbody.innerHTML = "";

jogadores.forEach((j,index)=>{

let classe = "";

if(index === 0){
classe = "primeiro";
}
else if(index >= jogadores.length - 3){
classe = "rebaixado";
}

tbody.innerHTML += `
<tr class="${classe}">
<td>${index+1}</td>
<td>${j.nome}</td>
<td>${j.pontos}</td>
<td>${j.jogos}</td>
<td>${j.vitorias}</td>
<td>${j.empates}</td>
<td>${j.derrotas}</td>
<td>${j.nascimento}</td>
<td>${j.idade}</td>
</tr>
`;

});

const agora = new Date();

document.getElementById("ultimaAtualizacao").innerHTML =
agora.toLocaleDateString('pt-BR') +
" às " +
agora.toLocaleTimeString('pt-BR');

}

function gerarPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF("landscape");

doc.setFillColor(30,41,59);
doc.rect(0,0,300,25,'F');

doc.setTextColor(255,255,255);
doc.setFontSize(20);
doc.text("Tabela de Classificação",15,16);

const linhas = [];

jogadores.forEach((j,index)=>{

linhas.push([
index+1,
j.nome,
j.pontos,
j.jogos,
j.vitorias,
j.empates,
j.derrotas,
j.nascimento,
j.idade
]);

});

doc.autoTable({

startY:35,

head:[[
"Posição",
"Nome",
"Pontos",
"Jogos",
"Vitórias",
"Empates",
"Derrotas",
"Nascimento",
"Idade"
]],

body:linhas,

headStyles:{
fillColor:[30,41,59]
},

alternateRowStyles:{
fillColor:[240,240,240]
},

didParseCell:function(data){

if(data.section === 'body'){

if(data.row.index === 0){
data.cell.styles.fillColor = [200,247,197];
}

if(data.row.index >= jogadores.length-3){
data.cell.styles.fillColor = [255,214,214];
}

}

}

});

doc.save("classificacao.pdf");

}

carregarTabela();

</script>

</body>
</html>
