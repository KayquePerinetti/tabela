<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Classificação Futebol</title>
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
h1{text-align:center;}
button{padding:10px;margin:5px;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border:1px solid #ccc;text-align:center;}
.top1{background:#c8f7c5;font-weight:bold;}
.rebaixado{background:#ffd6d6;}
input{width:90%;}
.admin-panel{display:none;margin:10px 0;padding:10px;background:#fff;border:1px solid #ccc;}
div{
    display: flex;
    justify-content: center;
}
div img{
    height: 200px;
}
.link{
    margin: 10px;
    color: black;
    text-decoration: none;
}
.link:hover{
    color: blue;
    text-decoration: underline;
}
</style>
</head>

<body>
<div>
    <img src="logo.png" alt="Logo">
</div>
<h1>Classificação</h1>

<button onclick="loginAdmin()">Entrar Admin</button>
<button onclick="logoutAdmin()">Sair Admin</button>
<button onclick="exportPDF()">Baixar PDF</button>
<a class="link" href="Regulamento.pdf">Regulamento</a>
<a class="link" href="https://kayqueperinetti.github.io/Campeoes/">Campões</a>

<div class="admin-panel" id="adminPanel">
<button onclick="addPlayer()">Adicionar Jogador</button>
</div>

<table>
<thead>
<tr>
<th>Pos</th><th>Nome</th><th>Pts</th><th>Jogos</th>
<th>V</th><th>E</th><th>D</th><th>Idade</th><th>Ações</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
// 🔥 FIREBASE CONFIG (SUBSTITUA AQUI)
const firebaseConfig = {
  apiKey: "AIzaSyAYASzjXOLHfNkfQGfxPTYYlmoi6xr2S1E",
  authDomain: "tabela-7c5a5.firebaseapp.com",
  projectId: "tabela-7c5a5",
  storageBucket: "tabela-7c5a5.firebasestorage.app",
  messagingSenderId: "591831691882",
  appId: "1:591831691882:web:af7554a0e3fdcda9261013",
  measurementId: "G-2N7HHJQJ7T"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("classificacao");

let admin = false;
let data = [];

function calcIdade(nasc){
    let d = new Date();
    let n = new Date(nasc);
    let idade = d.getFullYear() - n.getFullYear();
    let m = d.getMonth() - n.getMonth();
    if(m < 0 || (m === 0 && d.getDate() < n.getDate())) idade--;
    return idade;
}

// 🔥 CARREGAR EM TEMPO REAL
db.on("value", snapshot=>{
    data = snapshot.val() ? Object.values(snapshot.val()) : [];
    render();
});

function save(){
    let obj = {};
    data.forEach((p,i)=> obj[i]=p);
    db.set(obj);
}

function render(){

    data.forEach(p=>{
        p.pontos = (p.vitorias*3)+(p.empates*1);
        p.jogos = p.vitorias+p.empates+p.derrotas;
        p.idade = calcIdade(p.nascimento);
    });

    data.sort((a,b)=>{
        if(b.pontos!==a.pontos) return b.pontos-a.pontos;
        if(b.idade!==a.idade) return b.idade-a.idade;
        return a.nome.localeCompare(b.nome);
    });

    let tbody = document.getElementById("tableBody");
    tbody.innerHTML="";

    data.forEach((p,i)=>{
        let tr=document.createElement("tr");

        if(i===0) tr.classList.add("top1");
        if(i>=data.length-3) tr.classList.add("rebaixado");

        tr.innerHTML=`
        <td>${i+1}</td>

        <td>${admin?`<input value="${p.nome}" onchange="edit(${i},'nome',this.value)">`:p.nome}</td>

        <td>${p.pontos}</td>
        <td>${p.jogos}</td>

        <td>${admin?`<input type='number' value="${p.vitorias}" onchange="edit(${i},'vitorias',this.value)">`:p.vitorias}</td>

        <td>${admin?`<input type='number' value="${p.empates}" onchange="edit(${i},'empates',this.value)">`:p.empates}</td>

        <td>${admin?`<input type='number' value="${p.derrotas}" onchange="edit(${i},'derrotas',this.value)">`:p.derrotas}</td>

        <td>${p.idade}</td>

        <td>${admin?`<button onclick="remove(${i})">Excluir</button>`:"-"}</td>
        `;

        tbody.appendChild(tr);
    });
}

function edit(i,campo,valor){
    data[i][campo]=campo==="nome"?valor:parseInt(valor);
    save();
}

function addPlayer(){
    let nome=prompt("Nome:");
    let nasc=prompt("Nascimento DD-MM-AAAA:");

    if(!nome||!nasc)return;

    data.push({
        nome,
        nascimento:nasc,
        vitorias:0,
        empates:0,
        derrotas:0
    });

    save();
}

function remove(i){
    data.splice(i,1);
    save();
}

// ADMIN
function loginAdmin(){
    let senha=prompt("Senha:");
    if(senha==="074708"){
        admin=true;
        document.getElementById("adminPanel").style.display="block";
        render();
    }else alert("Errado");
}

function logoutAdmin(){
    admin=false;
    document.getElementById("adminPanel").style.display="none";
    render();
}

// PDF
function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();

    doc.text("Classificação",10,10);

    let rows=data.map((p,i)=>[
        i+1,p.nome,p.pontos,p.jogos,p.vitorias,p.empates,p.derrotas,p.idade
    ]);

    doc.autoTable({
        head:[["Pos","Nome","Pts","Jogos","V","E","D","Idade"]],
        body:rows
    });

    doc.save("classificacao.pdf");
}
</script>

</body>
</html>
