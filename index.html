   <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de PDF</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    height:100vh;
}

header{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.pdf-container{
    width:100%;
    height:calc(100vh - 60px);
}

.pdf-container iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<header>
    Visualizador de PDF
</header>

<div class="pdf-container">
    <iframe src="arquivo.pdf"></iframe>
</div>

</body>
</html>
