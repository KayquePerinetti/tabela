<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabela de Classificação</title>
<link rel="shortcut icon" href="logo1.png" type="32x32">
<!-- Estilo -->
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    text-align: center;
}
div{
    display: grid;
    justify-content: center;
    justify-items: center;
}
.logo{
    height: 200px;
}

.info {
    text-align: center;
    margin-top: 30px;
    font-weight: bold;
    color: #333;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #222;
    color: white;
}

tr:first-child {
    background: #d4f7d4; /* 1º lugar verde claro */
}

tr:nth-last-child(-n+3) {
    background: #ffd6d6; /* últimas 3 vermelhas claras */
}
.inicio{
    display:inline-flex;
    margin: 30px;
}
button {
    display: grid;
    justify-items: start;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
.link{
    margin: 15px;
    text-decoration: none;
    color: #222;
}
.link:hover{
    text-decoration: underline;
    color: blue;
}
</style>
</head>

<body>

<h1>Tabela de Classificação</h1>
<div>
<img class="logo" src="logo1.png" alt="Logo">
</div>
<div class="inicio">
<button onclick="baixarPDF()">Baixar PDF</button>
<a class="link" href="Regulamento.pdf">Regulamento</a>
<a class="link" href="https://kayqueperinetti.github.io/Campeoes/">Campeões</a>
</div>
<table id="tabela">
<thead>
<tr>
    <th>Posição</th>
    <th>Nome</th>
    <th>Pontos</th>
    <th>Vitórias</th>
    <th>Empates</th>
    <th>Derrotas</th>
    <th>Idade</th>
    <th>Data de Nascimento</th>
</tr>
</thead>

<tbody>

<tr>
    <td>1</td>
    <td>Leonardo Oliveira</td>
    <td>0</td>
    <td>0</td>
    <td>0</td>
    <td>0</td>
    <td>28</td>
    <td>25/02/1998</td>
</tr>

<tr>
    <td>2</td>
    <td>Miguel da Silva</td>
    <td>0</td>
    <td>0</td>
    <td>0</td>
    <td>0</td>
    <td>19</td>
    <td>18/03/2007</td>
</tr>
</tbody>
</table>

<div class="info" id="ultimaEdicao"></div>

<!-- Libs PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// Exibe última modificação do arquivo (quando o código foi alterado)
function mostrarUltimaEdicao() {
    const info = document.getElementById("ultimaEdicao");
    const data = document.lastModified;
    info.innerHTML = "Última edição do código: " + data;
}

// Exportar PDF da tabela
async function baixarPDF() {
    const tabela = document.getElementById("tabela");

    const canvas = await html2canvas(tabela);
    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    const imgWidth = 190;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
    pdf.save("classificacao.pdf");
}

// Inicializa
mostrarUltimaEdicao();
</script>

</body>
</html>
